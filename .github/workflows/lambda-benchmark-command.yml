name: Lambda Benchmark (on demand)

# On-demand benchmark for fork PRs (issue #110). Fork code is untrusted, so it
# never auto-runs with the AWS role -- a MAINTAINER opts in per PR, either by
# commenting `/benchmark` or applying the `benchmark` label. The result is posted
# as a comment and is NOT retained (same as a same-repo PR run). The maintainer
# trigger is the trust boundary: running this vouches for the checked-out code.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled]

# Least privilege: the gate job only needs to read + react/comment. OIDC
# (id-token) is granted ONLY to the run job that assumes the role.
permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      pr_sha: ${{ steps.gate.outputs.pr_sha }}
      head_ref: ${{ steps.gate.outputs.head_ref }}
      head_repo: ${{ steps.gate.outputs.head_repo }}
      worker_note: ${{ steps.gate.outputs.worker_note }}
    steps:
      - name: Gate on maintainer trigger
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let prNumber;

            // First, does the textual trigger match (and is it a PR)?
            if (context.eventName === 'issue_comment') {
              if (!context.payload.issue.pull_request) return core.setOutput('should_run', 'false');
              // Require `/benchmark` to LEAD a line, not appear anywhere in the
              // body (issue #126): a body that merely *mentions* the string --
              // inside a path like `tests/data/benchmark/...`, a URL like
              // `.../zagg/benchmarks/site/...`, or mid-prose ("don't run
              // `/benchmark` yet") -- must NOT trigger a billed run. The command
              // must start a line (optional leading whitespace) and be bounded by
              // whitespace/EOL, so `/benchmark.md` and `/benchmarks/` (glued to
              // more characters) are rejected while a leading `/benchmark` or
              // `/benchmark <targets>` still fires.
              if (!/^\s*\/benchmark(\s|$)/m.test(context.payload.comment.body)) {
                return core.setOutput('should_run', 'false');
              }
              prNumber = context.payload.issue.number;
            } else {
              if (context.payload.label.name !== 'benchmark') return core.setOutput('should_run', 'false');
              prNumber = context.payload.pull_request.number;
            }

            // The trust boundary: the ACTOR must have write/admin on this repo.
            // author_association (MEMBER/COLLABORATOR) is a relationship, not a
            // permission, and labels are addable at triage level -- neither is
            // sufficient to hand fork code the AWS role.
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner, repo, username: context.actor,
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.notice(`actor ${context.actor} lacks write access (${perm.permission}); not running`);
              return core.setOutput('should_run', 'false');
            }

            if (context.eventName === 'issue_comment') {
              await github.rest.reactions.createForIssueComment({
                owner, repo, comment_id: context.payload.comment.id, content: 'rocket',
              });
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            core.setOutput('should_run', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);

            // Fork runs never redeploy -> they benchmark the stable worker. If
            // this PR touches lambda-deployed code, flag that the numbers don't
            // reflect it (issue #25, tier 1).
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber, per_page: 100,
            });
            const affecting = /^(src\/zagg\/|deployment\/aws\/|pyproject\.toml)/;
            const touched = files.some(f => affecting.test(f.filename));
            core.setOutput('worker_note', touched
              ? "Worker = stable `main`, not this PR's code — fork PRs aren't redeployed, so cost/runtime here don't reflect changes to lambda-deployed code."
              : "");

  run:
    needs: check
    # Skip cleanly until the benchmark is configured (no role -> nothing to assume).
    if: needs.check.outputs.should_run == 'true' && vars.BENCHMARK_ROLE_ARN != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    # One run per PR; a newer trigger supersedes an in-flight one.
    concurrency:
      group: lambda-benchmark-cmd-${{ needs.check.outputs.pr_number }}
      cancel-in-progress: true
    steps:
      # Base-pin: the benchmark HARNESS (run_benchmark.py, bench_metrics.py,
      # targets.json, the pinned shard maps + configs) comes from base `main`, so
      # an untrusted fork can't rewrite what the benchmark does (target, cost
      # math, shard selection). Only the fork's `src/zagg` -- the code we actually
      # want to measure -- is overlaid on top. (The fork's package still executes
      # with the role, so the role stays minimally scoped + the maintainer gate
      # stands; this removes the harness/target-tampering vector, not that.)
      - name: Checkout base harness
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Checkout fork src/zagg
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.check.outputs.head_repo }}
          ref: ${{ needs.check.outputs.pr_sha }}
          path: _fork
          sparse-checkout: src/zagg

      - name: Overlay fork package under test
        run: |
          set -euo pipefail
          if [ ! -d _fork/src/zagg ]; then
            echo "fork has no src/zagg; nothing to benchmark" >&2
            exit 1
          fi
          rm -rf src/zagg
          cp -r _fork/src/zagg src/zagg

      # The runner resolves urs.earthdata.nasa.gov to an AAAA record but has no
      # usable IPv6 route, so earthaccess.login() (inside run_benchmark.py) dies
      # immediately with `[Errno 101] Network is unreachable` (issue #137).
      # Raising the getaddrinfo precedence of IPv4-mapped addresses makes glibc
      # return+try the A record first, so the login handshake takes the routable
      # IPv4 path. Runner-only config -- the shipped package and user auth are
      # untouched.
      - name: Prefer IPv4 for Earthdata login (issue #137)
        run: echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf

      - name: Run benchmark (base harness, fork package)
        uses: ./.github/actions/run-benchmark
        with:
          role-arn: ${{ vars.BENCHMARK_ROLE_ARN }}
          aws-region: ${{ vars.BENCHMARK_AWS_REGION }}
          function-name: ${{ vars.BENCHMARK_FUNCTION_NAME }}
          store-prefix: ${{ vars.BENCHMARK_STORE_PREFIX }}
          edl-token: ${{ secrets.EARTHDATA_TOKEN }}
          event: pr
          commit: ${{ needs.check.outputs.pr_sha }}
          ref-label: ${{ needs.check.outputs.head_ref }}
          pr-number: ${{ needs.check.outputs.pr_number }}
          worker-note: ${{ needs.check.outputs.worker_note }}

      # always(): a silent-OOM target now fails the benchmark step (--fail-on-empty,
      # issue #145), but the maintainer who ran /benchmark should still see WHY --
      # the just-written comment.md carries the obs=0 row. Skip cleanly if the run
      # died before writing it (e.g. login failure -> no comment to post).
      - name: Upsert PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('comment.md')) {
              core.info('no comment.md (benchmark did not get far enough); skipping');
              return;
            }
            const body = fs.readFileSync('comment.md', 'utf8');
            const marker = '<!-- zagg-benchmark -->';
            const { owner, repo } = context.repo;
            const issue_number = Number('${{ needs.check.outputs.pr_number }}');
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
