# ATL03 photon-height aggregation template.
#
# Scalar-only stats (non-scalar outputs are deferred to #29): per-cell density
# (photon count), min/max elevation, mean and median height, and variance.
#
# Confidence filter drops only TEP (transmit-echo path) photons and keeps
# everything else: signal_conf_ph != -2, per the ATL03 v3 data dictionary
# (https://nsidc.org/sites/default/files/icesat2_atl03_data_dict_v003_0.pdf).
#
# signal_conf_ph is 2-D in ATL03 (n_photons x 5 surface types). TEP photons are
# flagged -2 across every surface type, so with no column selector the != -2
# filter is reduced across all columns (a photon is dropped only when it is TEP
# for all surface types). Grid is rectilinear (HEALPix order-19, the ~10 m
# match, waits on mortie #35).
data_source:
  reader: h5coro
  driver: s3
  groups: [gt1l, gt1r, gt2l, gt2r, gt3l, gt3r]
  coordinates:
    latitude: "/{group}/heights/lat_ph"
    longitude: "/{group}/heights/lon_ph"
  variables:
    h_ph: "/{group}/heights/h_ph"
  quality_filter:
    dataset: "/{group}/heights/signal_conf_ph"
    value: -2                      # TEP flag; reduced across all surface types
    op: ne

aggregation:
  variables:
    count:
      function: len
      source: h_ph
      dtype: int32
      fill_value: 0
    h_min:
      function: min
      source: h_ph
      dtype: float32
    h_max:
      function: max
      source: h_ph
      dtype: float32
    h_mean:
      function: mean
      source: h_ph
      dtype: float32
    h_median:
      function: median
      source: h_ph
      dtype: float32
    h_variance:
      function: var
      source: h_ph
      dtype: float32

output:
  grid:
    type: rectilinear
    crs: EPSG:4326
    resolution: 0.0001            # degrees (~10 m at the equator)
    bounds: [-180, -90, 180, 90]
    chunk_shape: [256, 256]
