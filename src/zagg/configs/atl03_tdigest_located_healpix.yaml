# ATL03 photon-height t-digest with a morton location channel (issue #87).
#
# The located variant of atl03_tdigest_healpix.yaml: identical read plan, grid,
# and t-digest sketch, plus ``location: leaf_id`` on the ragged field. Each
# centroid then also carries a high-resolution morton location -- the deepest
# HEALPix cell enclosing the photons merged into it, computed by folding their
# order-29 point-kind morton words (``HealpixGrid.assign``) through
# ``mortie.common_ancestor``. A one-photon centroid stores its exact order-29
# point word. On disk the locations are a uint64 companion CSR array
# (``{field}/{shard}/locations``) sharing offsets/cell_ids with the float32
# digest -- one logical multivariable field, two physical arrays, each channel
# lossless in its own dtype (an order-29 word exceeds float64's 2^53 exact-int
# ceiling, so no interleaved float layout can carry it). Read the channel back
# with ``zagg.readers.read_locations``; decode/coarsen/query the packed words
# with mortie primitives (``mort2healpix``, ``clip2order``, ``common_ancestor``).
data_source:
  reader: h5coro
  driver: s3
  groups: [gt1l, gt1r, gt2l, gt2r, gt3l, gt3r]
  coordinates:
    latitude: "/{group}/heights/lat_ph"
    longitude: "/{group}/heights/lon_ph"
  variables:
    h_ph: "/{group}/heights/h_ph"
  filters:
    - dataset: "/{group}/heights/signal_conf_ph"
      column: 0                  # land surface type; TEP is uniform across columns
      op: ne
      value: -2
  base_level: photons
  levels:
    photons:
      path: "/{group}/heights"
      coordinates: {latitude: lat_ph, longitude: lon_ph}
      link: null
    segments:
      path: "/{group}/geolocation"
      coordinates: {latitude: reference_photon_lat, longitude: reference_photon_lon}
      link:
        to: photons
        index_beg: "/{group}/geolocation/ph_index_beg"
        count: "/{group}/geolocation/segment_ph_cnt"
        index_base: 1            # ATL03 ph_index_beg is 1-based per the v3 dict
  read_plan:
    spatial_index: segments
    pad: 1                       # one segment of padding on each side per #43

aggregation:
  coordinates:
    cell_ids:
      dtype: uint64
      fill_value: 0
    morton:
      dtype: uint64
      fill_value: 0
  variables:
    count:
      function: len
      source: h_ph
      dtype: int32
      fill_value: 0
    h_tdigest:
      # Located per-cell t-digest: ``build_tdigest`` receives the cell's
      # per-photon order-29 morton words (``locations=leaf_id``) and returns a
      # ``(digest, locations)`` pair -- the (n_centroids, 2) float32 (mean,
      # weight) array plus the (n_centroids,) uint64 per-centroid location
      # vector, stored as the companion CSR array described above.
      kind: ragged
      function: "zagg.stats.tdigest.build_tdigest"
      source: h_ph
      location: leaf_id
      inner_shape: [2]
      params:
        delta: 256
      dtype: float32
      fill_value: 0

output:
  grid:
    type: healpix
    indexing_scheme: nested
    parent_order: 11             # shard / dispatch unit: 4^(19-11) = 256x256 cells
    chunk_inner: 13              # inner Zarr chunk: 4^(19-13) = 64x64 cells (K=16 per shard)
    # ShardingCodec output (issue #108/#133, decided on the #170 read-matrix
    # evidence 2026-07-07): at identical reads, sharded collapses the
    # per-inner-chunk aggregation grouping + K CSR writes (o9: agg 165->19 s,
    # write 148->15 s per worker; -44% cost vs inner). The benchmark matrix
    # keeps both codecs as explicit A/B columns.
    sharded: true
    child_order: 19              # leaf cell resolution (~10 m)
