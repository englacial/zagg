AWSTemplateFormatVersion: "2010-09-09"
# The AWS::LanguageExtensions macro provides Fn::ForEach, which stamps the
# issue #235 worker-size variants from one parameterized block per resource
# family instead of ~24 hand-written near-identical resources. The macro runs
# server-side at change-set creation (stand_up.sh deploys via change sets and
# passes CAPABILITY_AUTO_EXPAND to acknowledge the macro); the expansion is
# deterministic and visible in the change set, or post-deploy via
# `aws cloudformation get-template --template-stage Processed`.
Transform: AWS::LanguageExtensions
Description: >-
  zagg serverless backend — Lambda execution role, dependency layer, and the
  process-shard Lambda function. By default the stack creates its own execution
  role (self-contained, clean teardown — the path for self-hosters who admin
  their own account). In IAM-constrained accounts (e.g. an SSO power-user that
  lacks iam:CreateRole), set CreateExecutionRole=false and pass an admin-created
  role via ExecutionRoleArn — see execution_role.yaml / EXECUTION_ROLE.md.
  Layer and function code are pulled from a same-region S3 bucket
  (ArtifactBucket); use stand_up.sh to populate it from a GitHub Release, or
  point it at your own copy of the zips.

Parameters:
  FunctionName:
    Type: String
    Default: process-shard
    Description: Name of the Lambda function to create.

  Architecture:
    Type: String
    Default: arm64
    AllowedValues: [arm64, x86_64]
    Description: Lambda CPU architecture. Must match the layer/function zips.

  ArtifactBucket:
    Type: String
    Description: >-
      S3 bucket (in THIS stack's region) holding the layer and function zips.
      CloudFormation requires Lambda code to live in a same-region bucket.

  LayerS3Key:
    Type: String
    Default: lambda_layer_arm64.zip
    Description: S3 key of the dependency layer zip within ArtifactBucket.

  FunctionS3Key:
    Type: String
    Default: lambda_function_arm64_py312.zip
    Description: S3 key of the function code zip within ArtifactBucket.

  OutputBucketName:
    Type: String
    Description: >-
      Bucket where results (parquet/zarr) are written. A stack-created execution
      role is scoped to this bucket. Set CreateOutputBucket=true to have the
      stack create it; otherwise it must already exist and be writable by the
      execution role.

  CreateOutputBucket:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Whether to create OutputBucketName as part of this stack.

  CreateExecutionRole:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      Whether the stack creates the Lambda execution role (needs iam:CreateRole).
      Set to false in IAM-constrained accounts and supply ExecutionRoleArn
      instead.

  ExecutionRoleArn:
    Type: String
    Default: ""
    Description: >-
      ARN of a pre-existing Lambda execution role to use when
      CreateExecutionRole=false. Must trust lambda.amazonaws.com and allow
      CloudWatch Logs + write to OutputBucketName. Ignored when
      CreateExecutionRole=true.

  MemorySize:
    Type: Number
    Default: 4096
    Description: >-
      Function memory in MB. 4096 (~2.3 vCPU) is the issue #180 sizing default:
      the pipeline saturates its available parallelism at ~1.3 effective cores,
      faster and cheaper per AOI than 2048 (issue #193).

  Timeout:
    Type: Number
    Default: 900
    Description: >-
      Function timeout in seconds. 900 is the Lambda hard ceiling — bumped from
      720 for the 88S stress shards (issue #148); there is no timeout lever
      beyond this, only smaller shards or cheaper reads.

  MallocArenaMax:
    Type: String
    Default: "2"
    Description: >-
      glibc MALLOC_ARENA_MAX for the process function (issue #143). Caps the
      number of per-thread malloc arenas so freed numpy/glibc heap is returned
      to the OS between warm invocations instead of accumulating toward the
      memory cap. Must be set as an env var (it takes effect at libc init; a
      runtime mallopt/malloc_trim from Python does not). Set empty to fall back to the glibc default (the key is still emitted, just empty).

  MallocTrimThreshold:
    Type: String
    Default: "0"
    Description: >-
      glibc MALLOC_TRIM_THRESHOLD_ for the process function (issue #143). 0
      trims freed top-of-heap back to the OS immediately, independently
      flattening warm-container memory growth. Set empty to fall back to the glibc default (the key is still emitted, just empty).

  RecycleRssMb:
    Type: String
    Default: "1400"
    Description: >-
      ZAGG_RECYCLE_RSS_MB for the worker self-recycle (issue #171): after an
      async invocation's result is safely mirrored to its result_url, the
      handler exits the sandbox when current RSS meets/exceeds this many MB,
      forcing the next invocation cold instead of ratcheting toward OOM
      (issue #169 observed ~700-1100 MB retained per heavy invocation on a
      2047 MB cap; 1400 leaves ~650 MB of headroom so the triggering
      invocation itself still completes). The self-exit is AFTER the result
      write, so the run loses nothing; it shows up as a runtime failure in
      CloudWatch error metrics only (cosmetic -- the result object is the
      source of truth, and MaximumRetryAttempts is 0). Set "0" or empty to
      disable the RSS check.

  RecycleMaxInvocations:
    Type: String
    Default: "1"
    Description: >-
      ZAGG_RECYCLE_MAX_INVOCATIONS for the worker self-recycle (issue #171):
      generation cap -- recycle the sandbox (same after-result-mirror
      mechanics as RecycleRssMb) once it has served this many invocations.
      The default "1" recycles after every invocation (cold-every-time);
      raise it to make this a belt-and-suspenders cap over the RSS check,
      bounding retention modes that check misses. Set "0" or empty to
      disable the generation check.

  CreateLogMetricFilters:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      Create the CloudWatch metric filters that split intentional
      self-recycles from genuine worker failures (issue #175): under the
      cold-every-time posture (RecycleMaxInvocations=1) every async
      invocation self-exits and counts in Lambda's raw Errors metric, so
      alarms must key on zagg/lambda WorkerErrorCount instead. Lambda
      creates /aws/lambda/<fn> log groups lazily on first invocation and
      AWS::Logs::MetricFilter requires the group to exist, so on a FRESH
      stack: create with "false", invoke each function once, then update
      the stack with "true". This covers all 8 log groups — the base
      function, its -extract twin, and the 6 worker-size variants
      (issue #235). Existing deployments keep the default.

  WorkerMemorySizes:
    Type: CommaDelimitedList
    Default: "2048,4096,8192"
    Description: >-
      Memory sizes (MB) of the pre-provisioned worker-size variants
      (issue #235). Each size S stamps two functions via Fn::ForEach:
      <FunctionName>-S (default 512 MB /tmp) and <FunctionName>-S-disk
      (/tmp from the WorkerDiskTmp mapping — keep that table in sync with
      this list). This is not a free-form knob: any added size needs a
      matching WorkerDiskTmp entry and must keep memory+2048 within Lambda's
      10240 MB /tmp ceiling (so nothing above 8192). The unsuffixed function
      and its -extract twin are independent of this list and stay the
      no-config default.

Mappings:
  # /tmp for the -disk variants is memory + 2048 MB (issue #235 thread
  # decision); 10240 for the 8192 variant is exactly Lambda's
  # EphemeralStorage ceiling, so the rule holds with no clamping. Keys must
  # cover every WorkerMemorySizes entry.
  WorkerDiskTmp:
    "2048": {SizeMb: 4096}
    "4096": {SizeMb: 6144}
    "8192": {SizeMb: 10240}

Conditions:
  ShouldCreateBucket: !Equals [!Ref CreateOutputBucket, "true"]
  ShouldCreateRole: !Equals [!Ref CreateExecutionRole, "true"]
  ShouldCreateMetricFilters: !Equals [!Ref CreateLogMetricFilters, "true"]

Resources:
  OutputBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldCreateBucket
    Properties:
      BucketName: !Ref OutputBucketName

  ExecutionRole:
    Type: AWS::IAM::Role
    Condition: ShouldCreateRole
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs-and-output-s3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${OutputBucketName}/*"
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${OutputBucketName}"
              # Public sliderule-public-cors bucket, whole-bucket by intent
              # (espg, PR #176): virtual-index write-back + sidecar reads
              # (zagg-index/*, issue #160) AND worker-written output zarr
              # stores (e.g. zagg-examples/*); Delete covers store overwrite
              # and manifest cleanup.
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws:s3:::sliderule-public-cors/*

  DepsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "${FunctionName}-deps"
      Content:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref LayerS3Key
      CompatibleArchitectures: [!Ref Architecture]
      CompatibleRuntimes:
        - python3.12

  ProcessFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      Handler: lambda_handler.lambda_handler
      Runtime: python3.12
      Architectures: [!Ref Architecture]
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      Role: !If [ShouldCreateRole, !GetAtt ExecutionRole.Arn, !Ref ExecutionRoleArn]
      Layers: [!Ref DepsLayer]
      Environment:
        Variables:
          MALLOC_ARENA_MAX: !Ref MallocArenaMax
          MALLOC_TRIM_THRESHOLD_: !Ref MallocTrimThreshold
          ZAGG_RECYCLE_RSS_MB: !Ref RecycleRssMb
          ZAGG_RECYCLE_MAX_INVOCATIONS: !Ref RecycleMaxInvocations
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref FunctionS3Key

  # Async-invoke hygiene (issue #151): the runner dispatches per-cell events
  # with InvocationType=Event and polls for the worker-written result object
  # until Timeout + a 90 s margin. Lambda's async defaults would re-run a
  # timed-out/OOM'd shard twice with delays -- re-failing deterministic
  # failures at extra cost and risking late writes into a store the caller has
  # moved on from -- so pin retries to 0. Event age must stay UNDER the poll
  # margin so no first delivery can start after the runner stops listening (a
  # late run would write into the store post-finalize); 60 is the API minimum
  # and leaves >=30 s of the margin for the result write. A delivery delayed
  # past it is dropped and the runner records the shard failed at its
  # deadline -- strictly better than a zombie write.
  ProcessFnAsyncConfig:
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !Ref ProcessFn
      Qualifier: "$LATEST"
      MaximumRetryAttempts: 0
      MaximumEventAgeInSeconds: 60

  # Dedicated chunk-boundary extraction function (issue #148). Extraction is
  # ALSO a mode of ProcessFn (mode="extract" — the incremental-update path);
  # this twin exists for full-archive extraction runs, giving them their own
  # concurrency/throttling pool so a catalog-wide fan-out cannot starve
  # per-cell processing. Same code zip, layer, role, memory, and the shared
  # 900 s Timeout — only the function name differs.
  ExtractFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${FunctionName}-extract"
      Handler: lambda_handler.lambda_handler
      Runtime: python3.12
      Architectures: [!Ref Architecture]
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      Role: !If [ShouldCreateRole, !GetAtt ExecutionRole.Arn, !Ref ExecutionRoleArn]
      Layers: [!Ref DepsLayer]
      Environment:
        Variables:
          MALLOC_ARENA_MAX: !Ref MallocArenaMax
          MALLOC_TRIM_THRESHOLD_: !Ref MallocTrimThreshold
          ZAGG_RECYCLE_RSS_MB: !Ref RecycleRssMb
          ZAGG_RECYCLE_MAX_INVOCATIONS: !Ref RecycleMaxInvocations
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref FunctionS3Key

  # Same async-invoke hygiene as ProcessFnAsyncConfig (issue #151), completing
  # the twin: retries pinned to 0 so a deterministic extraction failure on an
  # async fan-out is not re-billed at up to 900 s per service retry, and event
  # age pinned to the API-minimum 60 s.
  ExtractFnAsyncConfig:
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !Ref ExtractFn
      Qualifier: "$LATEST"
      MaximumRetryAttempts: 0
      MaximumEventAgeInSeconds: 60

  # Error-signal recovery under the cold-every-time posture (issue #175):
  # with RecycleMaxInvocations=1 every async invocation self-exits after its
  # result mirror, so Lambda's raw Errors metric is 100% noise. These filters
  # publish the split to the zagg/lambda namespace, per function:
  #   *SelfRecycleCount  -- the handler's ZAGG_SELF_RECYCLE line (expected).
  #   *WorkerErrorCount  -- genuine failure signatures only: handler-logged
  #     [ERROR] lines, unhandled-exception tracebacks, runtime timeouts,
  #     OOM kills, and nonzero runtime exits. The patterns are deliberately
  #     DISJOINT from the recycle path: a self-recycle logs at [INFO] and
  #     exits 0, which the runtime reports as "Runtime exited without
  #     providing a reason" -- not matched ("Runtime exited with error" is).
  # The filters reference the implicit /aws/lambda/<fn> log groups by name
  # rather than owning AWS::Logs::LogGroup resources: adopting a group Lambda
  # already created fails stack CREATE/UPDATE with "already exists", the
  # non-recoverable path for deployed stacks. See CreateLogMetricFilters for
  # the fresh-stack ordering caveat.
  ProcessSelfRecycleFilter:
    Type: AWS::Logs::MetricFilter
    Condition: ShouldCreateMetricFilters
    DependsOn: ProcessFn
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FunctionName}"
      FilterPattern: '"ZAGG_SELF_RECYCLE"'
      MetricTransformations:
        - MetricNamespace: zagg/lambda
          MetricName: ProcessSelfRecycleCount
          MetricValue: "1"
          DefaultValue: 0

  ProcessWorkerErrorFilter:
    Type: AWS::Logs::MetricFilter
    Condition: ShouldCreateMetricFilters
    DependsOn: ProcessFn
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FunctionName}"
      FilterPattern: >-
        ?"Task timed out" ?"Runtime.OutOfMemory"
        ?"Runtime exited with error" ?"[ERROR]"
        ?"Traceback (most recent call last)"
      MetricTransformations:
        - MetricNamespace: zagg/lambda
          MetricName: ProcessWorkerErrorCount
          MetricValue: "1"
          DefaultValue: 0

  ExtractSelfRecycleFilter:
    Type: AWS::Logs::MetricFilter
    Condition: ShouldCreateMetricFilters
    DependsOn: ExtractFn
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FunctionName}-extract"
      FilterPattern: '"ZAGG_SELF_RECYCLE"'
      MetricTransformations:
        - MetricNamespace: zagg/lambda
          MetricName: ExtractSelfRecycleCount
          MetricValue: "1"
          DefaultValue: 0

  ExtractWorkerErrorFilter:
    Type: AWS::Logs::MetricFilter
    Condition: ShouldCreateMetricFilters
    DependsOn: ExtractFn
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FunctionName}-extract"
      FilterPattern: >-
        ?"Task timed out" ?"Runtime.OutOfMemory"
        ?"Runtime exited with error" ?"[ERROR]"
        ?"Traceback (most recent call last)"
      MetricTransformations:
        - MetricNamespace: zagg/lambda
          MetricName: ExtractWorkerErrorCount
          MetricValue: "1"
          DefaultValue: 0

  # Pre-provisioned worker-size variants (issue #235): same code zip, layer,
  # role, timeout, and env as ProcessFn — selected at run time by function
  # name (config `worker:` block / agg(function_name=...)), so per-run sizing
  # needs no admin-role config mutation. Two Fn::ForEach loops over
  # WorkerMemorySizes stamp, per size S: <FunctionName>-S (this loop, default
  # 512 MB /tmp) and <FunctionName>-S-disk (next loop, /tmp from
  # WorkerDiskTmp). Each variant carries the issue #151 EventInvokeConfig and
  # the issue #175 self-recycle/worker-error metric-filter pair, mirroring
  # the unsuffixed function's blocks above. The variant FunctionName strings
  # are assembled ONLY in each loop's `FunctionName: !Sub` line.
  'Fn::ForEach::WorkerSizeVariants':
    - WorkerMemory
    - !Ref WorkerMemorySizes
    - 'WorkerFn${WorkerMemory}':
        Type: AWS::Lambda::Function
        Properties:
          FunctionName: !Sub "${FunctionName}-${WorkerMemory}"
          Handler: lambda_handler.lambda_handler
          Runtime: python3.12
          Architectures: [!Ref Architecture]
          MemorySize: !Ref WorkerMemory
          Timeout: !Ref Timeout
          Role: !If [ShouldCreateRole, !GetAtt ExecutionRole.Arn, !Ref ExecutionRoleArn]
          Layers: [!Ref DepsLayer]
          Environment:
            Variables:
              MALLOC_ARENA_MAX: !Ref MallocArenaMax
              MALLOC_TRIM_THRESHOLD_: !Ref MallocTrimThreshold
              ZAGG_RECYCLE_RSS_MB: !Ref RecycleRssMb
              ZAGG_RECYCLE_MAX_INVOCATIONS: !Ref RecycleMaxInvocations
          Code:
            S3Bucket: !Ref ArtifactBucket
            S3Key: !Ref FunctionS3Key
      # Cross-references to looped logical IDs use the documented ForEach
      # idioms (issue #269): Ref/GetAtt take a nested Fn::Sub for the logical
      # id — a bare '...${WorkerMemory}' string is NOT substituted by the
      # transform and fails changeset creation with "Unresolved resource
      # dependencies". DependsOn (which forbids intrinsics) is replaced by an
      # implicit dependency: LogGroupName derives from Ref(function) == the
      # function name, ordering filter-after-function without DependsOn.
      'WorkerFn${WorkerMemory}AsyncConfig':
        Type: AWS::Lambda::EventInvokeConfig
        Properties:
          FunctionName: !Ref
            'Fn::Sub': 'WorkerFn${WorkerMemory}'
          Qualifier: "$LATEST"
          MaximumRetryAttempts: 0
          MaximumEventAgeInSeconds: 60
      'WorkerFn${WorkerMemory}SelfRecycleFilter':
        Type: AWS::Logs::MetricFilter
        Condition: ShouldCreateMetricFilters
        Properties:
          LogGroupName: !Sub
            - '/aws/lambda/${WorkerName}'
            - WorkerName: !Ref
                'Fn::Sub': 'WorkerFn${WorkerMemory}'
          FilterPattern: '"ZAGG_SELF_RECYCLE"'
          MetricTransformations:
            - MetricNamespace: zagg/lambda
              MetricName: !Sub 'Worker${WorkerMemory}SelfRecycleCount'
              MetricValue: "1"
              DefaultValue: 0
      'WorkerFn${WorkerMemory}WorkerErrorFilter':
        Type: AWS::Logs::MetricFilter
        Condition: ShouldCreateMetricFilters
        Properties:
          LogGroupName: !Sub
            - '/aws/lambda/${WorkerName}'
            - WorkerName: !Ref
                'Fn::Sub': 'WorkerFn${WorkerMemory}'
          FilterPattern: >-
            ?"Task timed out" ?"Runtime.OutOfMemory"
            ?"Runtime exited with error" ?"[ERROR]"
            ?"Traceback (most recent call last)"
          MetricTransformations:
            - MetricNamespace: zagg/lambda
              MetricName: !Sub 'Worker${WorkerMemory}WorkerErrorCount'
              MetricValue: "1"
              DefaultValue: 0

  # The -disk trio (issue #235 / #217): identical to the loop above except
  # for the -disk name suffix and an explicit EphemeralStorage from the
  # WorkerDiskTmp mapping (memory + 2048 MB). EphemeralStorage appears ONLY
  # here — the default-512 trio omits it (512 is free; extra /tmp bills per
  # GB-s above 512, idle functions cost nothing either way).
  'Fn::ForEach::WorkerDiskVariants':
    - WorkerMemory
    - !Ref WorkerMemorySizes
    - 'WorkerFn${WorkerMemory}Disk':
        Type: AWS::Lambda::Function
        Properties:
          FunctionName: !Sub "${FunctionName}-${WorkerMemory}-disk"
          Handler: lambda_handler.lambda_handler
          Runtime: python3.12
          Architectures: [!Ref Architecture]
          MemorySize: !Ref WorkerMemory
          Timeout: !Ref Timeout
          Role: !If [ShouldCreateRole, !GetAtt ExecutionRole.Arn, !Ref ExecutionRoleArn]
          Layers: [!Ref DepsLayer]
          EphemeralStorage:
            Size: !FindInMap [WorkerDiskTmp, !Ref WorkerMemory, SizeMb]
          Environment:
            Variables:
              MALLOC_ARENA_MAX: !Ref MallocArenaMax
              MALLOC_TRIM_THRESHOLD_: !Ref MallocTrimThreshold
              ZAGG_RECYCLE_RSS_MB: !Ref RecycleRssMb
              ZAGG_RECYCLE_MAX_INVOCATIONS: !Ref RecycleMaxInvocations
          Code:
            S3Bucket: !Ref ArtifactBucket
            S3Key: !Ref FunctionS3Key
      # Same ForEach reference idioms as the default-tmp loop above (#269).
      'WorkerFn${WorkerMemory}DiskAsyncConfig':
        Type: AWS::Lambda::EventInvokeConfig
        Properties:
          FunctionName: !Ref
            'Fn::Sub': 'WorkerFn${WorkerMemory}Disk'
          Qualifier: "$LATEST"
          MaximumRetryAttempts: 0
          MaximumEventAgeInSeconds: 60
      'WorkerFn${WorkerMemory}DiskSelfRecycleFilter':
        Type: AWS::Logs::MetricFilter
        Condition: ShouldCreateMetricFilters
        Properties:
          LogGroupName: !Sub
            - '/aws/lambda/${WorkerName}'
            - WorkerName: !Ref
                'Fn::Sub': 'WorkerFn${WorkerMemory}Disk'
          FilterPattern: '"ZAGG_SELF_RECYCLE"'
          MetricTransformations:
            - MetricNamespace: zagg/lambda
              MetricName: !Sub 'Worker${WorkerMemory}DiskSelfRecycleCount'
              MetricValue: "1"
              DefaultValue: 0
      'WorkerFn${WorkerMemory}DiskWorkerErrorFilter':
        Type: AWS::Logs::MetricFilter
        Condition: ShouldCreateMetricFilters
        Properties:
          LogGroupName: !Sub
            - '/aws/lambda/${WorkerName}'
            - WorkerName: !Ref
                'Fn::Sub': 'WorkerFn${WorkerMemory}Disk'
          FilterPattern: >-
            ?"Task timed out" ?"Runtime.OutOfMemory"
            ?"Runtime exited with error" ?"[ERROR]"
            ?"Traceback (most recent call last)"
          MetricTransformations:
            - MetricNamespace: zagg/lambda
              MetricName: !Sub 'Worker${WorkerMemory}DiskWorkerErrorCount'
              MetricValue: "1"
              DefaultValue: 0

Outputs:
  FunctionArn:
    Description: ARN of the deployed Lambda function.
    Value: !GetAtt ProcessFn.Arn
  ExtractFunctionArn:
    Description: ARN of the dedicated extraction Lambda function (issue #148).
    Value: !GetAtt ExtractFn.Arn
  FunctionName:
    Description: Name of the deployed Lambda function.
    Value: !Ref ProcessFn
  LayerArn:
    Description: ARN of the published dependency layer version.
    Value: !Ref DepsLayer
  RoleArn:
    Description: ARN of the Lambda execution role (created or supplied).
    Value: !If [ShouldCreateRole, !GetAtt ExecutionRole.Arn, !Ref ExecutionRoleArn]
  OutputBucket:
    Description: Bucket where results are written.
    Value: !Ref OutputBucketName
  'Fn::ForEach::WorkerVariantArns':
    - WorkerMemory
    - !Ref WorkerMemorySizes
    # Output Descriptions take no intrinsics; if the transform leaves the
    # placeholder literal there it is cosmetic only (issue #269).
    - 'WorkerFn${WorkerMemory}Arn':
        Description: 'ARN of the worker-size variant (issue #235).'
        Value: !GetAtt
          - !Sub 'WorkerFn${WorkerMemory}'
          - Arn
      'WorkerFn${WorkerMemory}DiskArn':
        Description: 'ARN of the extra-disk worker variant (issue #235).'
        Value: !GetAtt
          - !Sub 'WorkerFn${WorkerMemory}Disk'
          - Arn
